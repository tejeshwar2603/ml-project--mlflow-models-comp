name: mlflow-comp

networks:
  mlflowcomp-net:
    name: mlflowcomp-net

volumes:
  mlflowcomp-postgres-data:
  mlflowcomp-zk-data:
  mlflowcomp-kafka-data:

services:
  # ---------------- Kafka (single broker, simulated telemetry ingestion) ----------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: mlflowcomp-zookeeper
    networks: [mlflowcomp-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2182:2181"
    volumes:
      - mlflowcomp-zk-data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: mlflowcomp-kafka
    networks: [mlflowcomp-net]
    depends_on: [zookeeper]
    ports:
      - "9095:9095"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,HOST://0.0.0.0:9095
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,HOST://localhost:9095
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - mlflowcomp-kafka-data:/var/lib/kafka/data

  # ---------------- Airflow (LocalExecutor, no celery/redis needed) ----------------
  airflow-postgres:
    image: postgres:13
    container_name: mlflowcomp-airflow-postgres
    networks: [mlflowcomp-net]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - mlflowcomp-postgres-data:/var/lib/postgresql/data

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: mlflowcomp-airflow-init
    networks: [mlflowcomp-net]
    depends_on: [airflow-postgres]
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      MLFLOW_TRACKING_URI: sqlite:////opt/airflow/project/mlflow_tracking.db
      PROJECT_DIR: /opt/airflow/project
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: mlflowcomp-airflow-webserver
    networks: [mlflowcomp-net]
    depends_on: [airflow-init]
    environment: *airflow-env
    ports:
      - "8090:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: mlflowcomp-airflow-scheduler
    networks: [mlflowcomp-net]
    depends_on: [airflow-init]
    environment: *airflow-env
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
    command: scheduler
